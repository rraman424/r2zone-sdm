<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2Zone Gateway</title>

    <script>
    (function() {
        // 1. Capture the exact sub-path typed by the user (e.g., "/sdm_installer.zip" or "/any/other/file.php")
        var requestedPath = window.location.pathname;

        // 2. Define your base destination URL (Leave out the trailing slash to prevent double slashes "//")
        var targetBaseUrl = "http://r2zonevns-001-site1.ktempurl.com/r2zone/SDM";

        // 3. Catch query parameters (?key=value) and hashes (#section) safely
        var search = window.location.search;
        var hash = window.location.hash;

        // 4. Instantly concatenate everything perfectly and forward the user
        // Example: sdm.r2zone.in/anything -> http://r2zonevns-001-site1.ktempurl.com/r2zone/SDM/anything
        window.location.replace(targetBaseUrl + requestedPath + search + hash);
    })();
</script>
</head>
<body>
    <div style="text-align: center; margin-top: 15%; font-family: Arial, sans-serif; color: #333;">
        <h3 style="margin-bottom: 5px;">Routing Request...</h3>
        <p style="color: #777; font-size: 14px;">Securing server connection parameters.</p>
    </div>
</body>
</html>

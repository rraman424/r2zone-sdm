<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Router Gateway</title>
    <script>
        (function() {
            // Your new temporary server root url (without trailing slash)
            var newServerBase = "http://r2zonevns-001-site1.ktempurl.com/r2zone/SDM";
            
            var path = window.location.pathname;
            var search = window.location.search;
            var hash = window.location.hash;

            // Combine them to make the exact target URL
            var directTargetUrl = newServerBase + path + search + hash;

            // Check the User-Agent to see who is calling this URL
            var userAgent = navigator.userAgent.toLowerCase();

            // Flutter's HTTP package always includes "dart" or "flutter" in its User-Agent string
            if (userAgent.includes('dart') || userAgent.includes('flutter')) {
                // Force the page to display raw JSON text so the Flutter App can parse it safely
                document.open("application/json");
                var jsonResponse = {
                    "status": "redirect",
                    "msg": "Use temporary origin server link directly",
                    "target_url": directTargetUrl
                };
                document.write(JSON.stringify(jsonResponse));
                document.close();
            } else {
                // If it's a normal web browser user, run your standard browser routing redirect instantly
                window.location.replace(directTargetUrl);
            }
        })();
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 15%; font-family: sans-serif; color: #666;">
        <p>Routing secure gateway parameters...</p>
    </div>
</body>
</html>

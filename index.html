<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>

    <script>
        (function() {
            // 1. Get the exact path, query parameters, or file name the user requested
            // For example: "/sdm_installer.zip"
            var requestedPath = window.location.pathname;
            
            // Clean up the path if it's just the root homepage
            if (requestedPath === "/" || requestedPath === "/index.html") {
                requestedPath = "";
            }

            // 2. Define your temporary hosting base destination
            var targetBaseUrl = "http://r2zonevns-001-site1.ktempurl.com/r2zone/SDM";

            // 3. Combine them perfectly and redirect
            // This turns sdm.r2zone.in/sdm_installer.zip into http://r2zonevns-001-site1.ktempurl.com/r2zone/SDM/sdm_installer.zip
            window.location.href = targetBaseUrl + requestedPath + window.location.search + window.location.hash;
            console.log(targetBaseUrl + requestedPath + window.location.search + window.location.hash)
        })();
    </script>
</head>
<body>
    <p style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        Connecting to download server, please wait...
    </p>
</body>
</html>
